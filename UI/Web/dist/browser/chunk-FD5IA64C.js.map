<ng-container *transloco="let t; prefix: 'download-button'">
  @if (canDownload()) {
    <button class="btn btn-actions" (click)="downloadClicked()" [ngbTooltip]="t('download-tooltip')" [disabled]="isDownloading()">
      @if (isDownloading()) {
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <span class="visually-hidden">{{t('downloading-status')}}</span>
      } @else {
        <i class="fa fa-arrow-alt-circle-down" aria-hidden="true"></i>
      }
    </button>
  }
</ng-container>
