<ng-container *transloco="let t; prefix: 'related-tab'">
  <div class="pb-2">
    @if (relationEntities().length > 0) {
      <app-carousel-reel [items]="relationEntities()" [title]="t('relations-title')">
        <ng-template #carouselItem let-item let-idx>
          <app-entity-card [entity]="item" [config]="relatedConfig()" [index]="idx" [maxIndex]="relationEntities().length"
                           (reload)="reload.emit({entity: 'relation', id: item.data.series.id})" />
        </ng-template>
      </app-carousel-reel>
    }

    @if (collectionEntities().length > 0) {
      <app-carousel-reel [items]="collectionEntities()" [title]="t('collections-title')">
        <ng-template #carouselItem let-item let-idx>
        <app-entity-card [entity]="item" [config]="collectionConfig()" [index]="idx" [maxIndex]="collectionEntities().length"
                         (reload)="reload.emit({entity: 'collection', id: $event})">
          <ng-template #subtitle>
            <app-collection-owner [collection]="item.data" />
          </ng-template>
          <ng-template #title let-entity>
            <app-promoted-icon [promoted]="entity.data.promoted" /> {{entity.data.title}}
          </ng-template>
        </app-entity-card>
        </ng-template>
      </app-carousel-reel>
    }


    @if (readingListEntities().length > 0) {
      <app-carousel-reel [items]="readingListEntities()" [title]="t('reading-lists-title')">
        <ng-template #carouselItem let-item let-idx>
          <app-entity-card [entity]="item" [index]="idx" [maxIndex]="readingListEntities().length" [config]="readingListConfig()"
                           (reload)="reload.emit({entity: 'readingList', id: $event})">
            <ng-template #title let-entity>
              <app-promoted-icon [promoted]="entity.data.promoted" /> {{entity.data.title}}
            </ng-template>
          </app-entity-card>
        </ng-template>
      </app-carousel-reel>
    }

    @if (bookmarks().length > 0) {
      <app-carousel-reel [items]="bookmarkEntities()" [title]="t('bookmarks-title')">
        <ng-template #carouselItem let-item let-idx>
          <app-entity-card [entity]="item" [index]="idx" [maxIndex]="bookmarkEntities().length" [config]="bookmarkConfig()"
                           (reload)="reload.emit({entity: 'bookmark', id: $event})" />
        </ng-template>
      </app-carousel-reel>
    }
  </div>
</ng-container>
