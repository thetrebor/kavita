<ng-container *transloco="let t; prefix: translationKey()">
  <div class="card p-4">
    <h4>{{t('title')}}</h4>

    <span>{{t('sub-title', {username: userName(), highestBucket: highestBucket()})}}</span>


    @if (bucketSpreadResource().hasValue()) {
      <app-bar-chart
        [data]="data()"
        [axisLabels]="labels()"
        [showLabels]="true"
        [horizontal]="false"
        [showToolTips]="false"
        labelPosition="top"
      />
    }
  </div>
</ng-container>
