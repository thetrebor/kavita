<ng-container *transloco="let t; prefix: translationKey()">
  <div class="card stats-card p-4">
    <h4 class="stats-title">{{t('title')}}</h4>

    <span class="stats-subtitle mb-4">{{t('sub-title', {username: userName(), highestBucket: highestBucket()})}}</span>


    @if (bucketSpreadResource().hasValue()) {
      <app-bar-chart
        [data]="data()"
        [axisLabels]="labels()"
        [showLabels]="true"
        [horizontal]="false"
        [showToolTips]="true"
        [toolTipFormatter]="toolTipFormatter"
        labelPosition="top"
      />
    }
  </div>
</ng-container>
