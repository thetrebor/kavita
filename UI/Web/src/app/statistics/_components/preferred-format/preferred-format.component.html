<ng-container *transloco="let t; prefix: 'preferred-format'">

  <div class="card p-4">

    <h4>{{t('title')}}</h4>

    @let mostReadFormatValue = mostReadFormat();
    @if (mostReadFormatValue) {
      <span>{{t('sub-title', {name: userName(), format: mostReadFormatValue})}}</span>
    }

    <div style="height: 300px; width: 100%"
         appECharts
         [options]="options()"
         [ignoreFirstResize]="false"
    ></div>
  </div>

</ng-container>
