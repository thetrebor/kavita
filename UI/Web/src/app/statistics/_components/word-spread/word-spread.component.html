<ng-container *transloco="let t; prefix:'word-spread'">
  <div class="card p-4">
    <h4>Books By Word Count</h4>

    <span>Most of {{userName()}}'s books contain between {{highestBucket()}} words</span>


    @if (wordSpreadResource.hasValue()) {
      <app-bar-chart
        [data]="data()"
        [axisLabels]="labels()"
        [showLabels]="true"
        [horizontal]="false"
        [showToolTips]="false"
        labelPosition="top"
      />
    }
  </div>
</ng-container>
