<ng-container *transloco="let t; prefix:'page-spread'">
  <div class="card p-4">
    <h4>Books By Page Count</h4>

    <span>Most of {{userName()}}'s books are between {{highestBucket()}} pages</span>


    @if (pageSpreadResource.hasValue()) {
      <app-bar-chart
        [data]="data()"
        [axisLabels]="labels()"
        [axisLabelsRight]="labelsRight()"
        [showLabels]="true"
        [horizontal]="false"
        [showToolTips]="true"
        labelPosition="top"
      />
    }
  </div>
</ng-container>
