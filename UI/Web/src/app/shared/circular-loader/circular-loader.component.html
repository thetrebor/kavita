<div [style.width.px]="width()" [style.height.px]="height()">
  @if (showIcon()) {
    <div [class.number]="center()"  class="indicator d-flex justify-content-center">
      <i class="fa fa-angle-double-down" [style.font-size.px]="fontSize()" aria-hidden="true"></i>
    </div>
  }

  @if (currentValue() > 0) {
    <circle-progress [percent]="currentValue()"
                     [radius]="100"
                     [outerStrokeWidth]="15"
                     [innerStrokeWidth]="0"
                     [space] = "0"
                     [backgroundPadding]="0"
                     outerStrokeLinecap="butt"
                     [outerStrokeColor]="outerStrokeColor()"
                     [innerStrokeColor]="innerStrokeColor()"
                     titleFontSize= "24"
                     unitsFontSize= "24"
                     [showSubtitle] = "false"
                     [animation]="animation()"
                     [animationDuration]="300"
                     [startFromZero]="false"
                     [responsive]="true"
                     [backgroundOpacity]="0.5"
                     [backgroundColor]="backgroundColor()"
      />
  }
</div>
